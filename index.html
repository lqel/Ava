<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%25 y=%2255%25 font-size=%2260%25 font-family=%22HarmonyOS Sans Regular%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22 fill=%22black%22>/A</text></svg>">
    <title>Home / Anthvia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'HarmonyOS Sans Regular', 'HarmonyOS Sans', sans-serif;
            font-weight: 400;
        }

        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #ffffff;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        .center-text {
            font-size: 8vw;
            color: #000000;
            letter-spacing: 0.06em;
            display: inline-flex;
            align-items: baseline;
            justify-content: center;
            line-height: 1;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 1.2s cubic-bezier(0.76, 0, 0.24, 1);
            z-index: 999;
        }

        .center-text.moved {
            top: 2rem;
            left: 2rem;
            transform: translate(0, 0);
            font-size: 1.8rem;
        }

        .slash {
            display: inline-block;
            clip-path: inset(12% 0 12% 0);
            animation: slashSlant 7s ease-in-out infinite;
            will-change: transform, opacity;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        @keyframes slashSlant {
            0%   { opacity: 1; transform: translate(0, 0) translateZ(0); }
            14%  { opacity: 1; transform: translate(0, 0) translateZ(0); }
            18%  { opacity: 0; transform: translate(15vw, -36vw) translateZ(0); }
            24%  { opacity: 0; transform: translate(-15vw, 36vw) translateZ(0); }
            28.5%{ opacity: 1; transform: translate(0, 0) translateZ(0); }
            100% { opacity: 1; transform: translate(0, 0) translateZ(0); }
        }

        .footer-text {
            position: absolute;
            color: #000000;
            bottom: 25%;
            text-align: left;
        }

        .left-bottom {
            left: 2rem;
            font-size: 1.2rem;
            opacity: 0;
            line-height: 1.5;
            pointer-events: none;
        }

        .right-bottom {
            right: 2rem;
            padding-top: 0.2em;
            font-size: 0.9rem;
            opacity: 1;
            transition: opacity 1s ease;
        }
        .right-bottom.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* 全屏铺满无留白 */
        .photo-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        /* 🔥 终极融合：只裁图片内部 + 超级模糊柔边 + 无任何原图边缘 */
        .photo {
            position: absolute;
            width: 60vw;
            height: 60vw;
            object-fit: none;
            opacity: 0;
            transition: opacity 2s ease;
            
            /* 🔥 完全看不到边缘：100%柔和融合 */
            -webkit-mask-image: radial-gradient(160% 160% at center, black 22%, transparent 70%);
            mask-image: radial-gradient(160% 160% at center, black 22%, transparent 70%);
            
            will-change: transform;
            animation: idleDrift 26s ease-in-out infinite alternate;
        }

        .photo.show {
            opacity: 0.92;
        }

        /* 指针不动时自动缓慢漂移 */
        @keyframes idleDrift {
            0%   { transform: translate(-50%, -50%) rotate(0deg) scale(3) translate(0px, 0px); }
            100% { transform: translate(-50%, -50%) rotate(0deg) scale(3) translate(42px, 36px); }
        }
    </style>
</head>
<body>
    <div class="center-text">
        ANTHV<span class="slash">/</span>A
    </div>

    <div class="footer-text left-bottom">
        一点星尘（深圳）科技有限公司<br>
        Anthvia Limited
    </div>
    
    <div class="footer-text right-bottom" id="email"></div>
    <div class="photo-wrapper" id="photoWrapper"></div>

    <script>
        document.getElementById("email").innerText = "contact" + "@" + "anthvia.com";

        // 自动 a-n 14张图
        const images = [];
        const start = 'a'.charCodeAt(0);
        for (let i = 0; i < 14; i++) {
            images.push(`images/${String.fromCharCode(start + i)}.jpg`);
        }

        setTimeout(() => {
            document.querySelector('.center-text').classList.add('moved');
            document.querySelector('.right-bottom').classList.add('hidden');
            setTimeout(initPhotos, 1000);
        }, 5000);

        // 🔥 核心：只裁图片内部 → 无原图边缘
        function initPhotos() {
            const wrapper = document.getElementById('photoWrapper');
            const count = 6;
            const selected = images.sort(() => 0.5 - Math.random()).slice(0, count);

            selected.forEach((src, i) => {
                const img = document.createElement('img');
                img.src = src;
                img.className = 'photo';

                // 🔥 随机截取图片内部（完全抛弃边缘）
                const cropX = 10 + Math.random() * 70;
                const cropY = 10 + Math.random() * 70;
                img.style.objectPosition = `${cropX}% ${cropY}%`;

                // 均匀全屏分布
                const step = 100 / count;
                const baseX = i * step;
                const posX = Math.min(100, Math.max(0, baseX + Math.random() * step));
                const posY = Math.min(100, Math.max(0, Math.random() * 100));

                // 极轻微随机角度，不颠倒
                const rot = (Math.random() * 14) - 7;

                img.style.left = posX + '%';
                img.style.top = posY + '%';
                img.style.transform = `translate(-50%, -50%) rotate(${rot}deg) scale(3)`;
                img.style.animationDelay = `${i * 0.4}s`;

                wrapper.appendChild(img);
            });

            setTimeout(() => {
                document.querySelectorAll('.photo').forEach(p => p.classList.add('show'));
            }, 100);

            initParallax();
        }

        // 鼠标/触摸物理浮动
        function initParallax() {
            const photos = document.querySelectorAll('.photo');
            let mouseX = 0, mouseY = 0;

            window.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth - 0.5) * 1.4;
                mouseY = (e.clientY / window.innerHeight - 0.5) * 1.4;
            });

            window.addEventListener('touchmove', (e) => {
                if (e.touches.length > 0) {
                    mouseX = (e.touches[0].clientX / window.innerWidth - 0.5) * 1.4;
                    mouseY = (e.touches[0].clientY / window.innerHeight - 0.5) * 1.4;
                }
            });

            function animate() {
                photos.forEach((img, i) => {
                    const speed = 8 + i * 1.8;
                    const mx = mouseX * speed;
                    const my = mouseY * speed;
                    const rot = parseFloat(img.style.transform.match(/rotate\((.*?)deg\)/)[1] || 0);
                    img.style.transform = `translate(-50%, -50%) rotate(${rot}deg) scale(3) translate(${mx}px, ${my}px)`;
                });
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
